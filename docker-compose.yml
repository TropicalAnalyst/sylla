services:
  sylla:
    build: .
    image: sylla:latest
    ports:
      - "8000:8000" # edit this to change the exposed port
    volumes:
      - instance:/app/instance
      - data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s 

volumes:
  instance:
  data: