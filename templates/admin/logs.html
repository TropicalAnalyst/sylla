{% extends "base.html" %}
{% block content %}
<div class="container mt-4">
    <h2>User Activity Logs</h2>
    <a href="{{ url_for('export_logs') }}" class="btn btn-outline-secondary mb-3">Export Logs</a>
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Date</th>
                <th>User ID</th>
                <th>Action</th>
                <th>Details</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{ format_dt(log.created_at) }}</td>
                <td>{{ users_map.get(log.user_id, log.user_id) }}</td>
                <td>{{ log.action }}</td>
                <td>{{ log.details }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
